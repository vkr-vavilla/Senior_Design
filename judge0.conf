################################################################################
# Judge0 configuration (local / dev).
# ⚠️ CHANGE THESE PASSWORDS before exposing Judge0 anywhere public.
################################################################################

# ── PostgreSQL (judge0-db service) ────────────────────────────────────────────
POSTGRES_HOST=judge0-db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=Judge0DevPassChangeMe

# ── Redis (judge0-redis service) ──────────────────────────────────────────────
REDIS_HOST=judge0-redis
REDIS_PORT=6379
REDIS_PASSWORD=Judge0RedisDevChangeMe

# ── Sandbox safety limits (upper bounds enforced on every submission) ──────────
# No network access from inside the sandbox; cap CPU time, wall time, memory, output.
ENABLE_NETWORK=false
MAX_CPU_TIME_LIMIT=5
MAX_WALL_TIME_LIMIT=10
MAX_MEMORY_LIMIT=256000
MAX_PROCESSES_AND_OR_THREADS=60

# ── Optional API auth ─────────────────────────────────────────────────────────
# Uncomment to require a token header on every Judge0 request (recommended if the
# 2358 port is ever reachable beyond localhost). The backend would send this header.
# AUTHN_HEADER=X-Auth-Token
# AUTHN_TOKEN=change-me-to-a-long-random-string
