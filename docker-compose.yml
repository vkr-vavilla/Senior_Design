services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      # Override the .env: pick backend without rebuilding the image.
      # AI_BACKEND=gemini   -> use Gemini cloud API
      # AI_BACKEND=qwen     -> use the vllm service below
      - AI_BACKEND=${AI_BACKEND:-qwen}
      - VLLM_AUTOSTART=false
      - VLLM_BASE_URL=http://vllm:8001/v1
      - ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      # Code execution: "piston" (sandboxed, default) or "local" (subprocess,
      # no isolation — trusted/demo only).
      - CODE_EXECUTOR=${CODE_EXECUTOR:-piston}
      # Piston code-execution sandbox, reachable on the compose network
      - PISTON_URL=http://piston:2000
    volumes:
      - ./backend:/app
    # Note: vllm is intentionally NOT in depends_on. It lives behind the "gpu"
    # profile, so on a Gemini/AWS box it simply isn't started, and the backend
    # reaches it lazily over the network only when AI_BACKEND=qwen.
    # piston IS a dependency: it's the code-execution sandbox used in every
    # deployment (CODE_EXECUTOR=piston), so it should always come up with backend.
    depends_on:
      - piston

  vllm:
    image: vllm/vllm-openai:v0.7.3
    # Local-model server only. Starts ONLY when the "gpu" profile is active:
    #   GPU box:    docker compose --profile gpu up -d   (AI_BACKEND defaults to qwen)
    #   Gemini box: docker compose up -d                 (no profile → vllm skipped)
    profiles: ["gpu"]
    command:
      - --model
      - Qwen/Qwen2.5-7B-Instruct-AWQ
      - --quantization
      - awq_marlin
      - --dtype
      - half
      - --port
      - "8001"
      - --max-model-len
      - "24576"
      - --gpu-memory-utilization
      - "0.90"
      - --enforce-eager
      - --max-num-seqs
      - "32"
      - --enable-lora
      - --max-lora-rank
      - "64"
      - --lora-modules
      - interviewer=/adapters/qwen2.5-7b-chatml-qlora-10k
    ports:
      - "8001:8001"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - ./training/artifacts:/adapters:ro
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # NEXT_PUBLIC vars are browser-side, so they use the host machine's address
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

  # ── Piston: self-hosted multi-language sandbox ──────────────────────────────
  # The code-execution backend (CODE_EXECUTOR=piston). No API key, runs offline.
  # Real isolation (cgroup + namespace) unlike CODE_EXECUTOR=local, and runs on
  # a stock cgroup v2 host with no kernel changes. Always on (backend depends on it).
  #   # one-time, install the language(s) you want — e.g. Python:
  #   curl -s -X POST localhost:2000/api/v2/packages \
  #        -H 'Content-Type: application/json' \
  #        -d '{"language":"python","version":"3.12.0"}'
  # NOTE: coding/driver.py is Python-only, so only Python submissions GRADE
  #       today; other languages execute but need a per-language driver first.
  piston:
    image: ghcr.io/engineer-man/piston:latest
    privileged: true
    ports:
      - "2000:2000"
    environment:
      # Raise the per-request caps (defaults are 3000ms run / 10000ms compile) so
      # they accommodate the grader's wall_time_limit (10s). Requests may not
      # exceed these, so they must be >= what piston_client sends.
      - PISTON_RUN_TIMEOUT=15000
      - PISTON_COMPILE_TIMEOUT=30000
    volumes:
      - piston-packages:/piston/packages
    tmpfs:
      - /tmp:exec
    restart: always

volumes:
  piston-packages:
